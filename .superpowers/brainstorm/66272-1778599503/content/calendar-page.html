<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药丸 - 日历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-warm: #FDF6EE;
  --bg-card: #FFFFFF;
  --accent-green: #6BBF7A;
  --accent-green-soft: #E8F7EB;
  --accent-orange: #F2994A;
  --accent-orange-soft: #FFF0E0;
  --accent-red: #EF5350;
  --accent-red-soft: #FFEBEE;
  --text-primary: #3D2E1F;
  --text-secondary: #8B7355;
  --text-muted: #BBA88A;
  --border-soft: #F0E6D8;
  --shadow-card: 0 4px 20px rgba(139, 115, 85, 0.08);
  --shadow-float: 0 8px 32px rgba(139, 115, 85, 0.12);
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
  background: var(--bg-warm);
  color: var(--text-primary);
  min-height: 100vh;
  max-width: 390px;
  margin: 0 auto;
  padding-bottom: 100px;
}

/* 顶部 */
.header {
  padding: 56px 24px 20px;
  animation: fadeDown 0.5s ease-out;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.month-title {
  font-family: 'Quicksand', sans-serif;
  font-size: 22px;
  font-weight: 700;
}

.month-arrows {
  display: flex;
  gap: 8px;
}

.arrow-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: white;
  border: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.arrow-btn:hover {
  background: var(--accent-orange-soft);
  border-color: var(--accent-orange);
}

/* 统计条 */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  animation: fadeUp 0.5s ease-out 0.1s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: white;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  box-shadow: var(--shadow-card);
}

.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.stat-dot.green { background: var(--accent-green); }
.stat-dot.red { background: var(--accent-red); }
.stat-dot.orange { background: var(--accent-orange); }

/* 日历网格 */
.calendar {
  padding: 0 16px;
  margin-top: 20px;
  animation: fadeUp 0.5s ease-out 0.2s both;
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 8px;
}

.weekday {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 8px 0;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  position: relative;
  cursor: pointer;
  transition: all 0.2s ease;
}

.day:hover { transform: scale(1.08); }

.day.empty { pointer-events: none; }

.day.today {
  background: white;
  box-shadow: var(--shadow-card);
  font-weight: 700;
}

.day.today::after {
  content: '';
  position: absolute;
  bottom: 6px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent-orange);
}

.day.selected {
  background: var(--accent-orange);
  color: white;
  box-shadow: 0 4px 12px rgba(242, 153, 74, 0.3);
}

.day.future { color: var(--text-muted); }

/* 服药状态指示器 */
.day .indicators {
  display: flex;
  gap: 2px;
  margin-top: 3px;
  position: absolute;
  bottom: 5px;
}

.day .ind {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}

.day .ind.done { background: var(--accent-green); }
.day .ind.missed { background: var(--accent-red); }
.day .ind.partial { background: var(--accent-orange); }

/* 选中日期详情 */
.day-detail {
  margin: 20px 20px 0;
  background: white;
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-float);
  animation: fadeUp 0.3s ease-out;
}

.day-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.day-detail-date {
  font-family: 'Quicksand', sans-serif;
  font-size: 16px;
  font-weight: 700;
}

.day-detail-badge {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 500;
}

.day-detail-badge.all-done {
  background: var(--accent-green-soft);
  color: #2E7D32;
}

.day-detail-badge.has-missed {
  background: var(--accent-red-soft);
  color: #C62828;
}

.detail-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #F8F2EB;
}

.detail-item:last-child { border-bottom: none; }

.detail-status {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.detail-status.done {
  background: var(--accent-green-soft);
  color: var(--accent-green);
}

.detail-status.missed {
  background: var(--accent-red-soft);
  color: var(--accent-red);
}

.detail-info { flex: 1; }
.detail-name { font-size: 14px; font-weight: 600; }
.detail-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.detail-time {
  font-size: 12px;
  color: var(--text-muted);
}

/* 底部导航 */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 390px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(240, 230, 216, 0.6);
  padding: 10px 0 28px;
  display: flex;
  justify-content: space-around;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.nav-item.active .nav-icon { color: var(--accent-orange); }
.nav-item.active .nav-label { color: var(--accent-orange); font-weight: 600; }
.nav-icon { font-size: 22px; color: var(--text-muted); }
.nav-label { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="month-nav">
    <div class="month-title">2026 年 5 月</div>
    <div class="month-arrows">
      <div class="arrow-btn">‹</div>
      <div class="arrow-btn">›</div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-chip"><span class="stat-dot green"></span>已服 28 次</div>
    <div class="stat-chip"><span class="stat-dot red"></span>漏服 2 次</div>
    <div class="stat-chip"><span class="stat-dot orange"></span>服药率 93%</div>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <div class="weekday">一</div>
    <div class="weekday">二</div>
    <div class="weekday">三</div>
    <div class="weekday">四</div>
    <div class="weekday">五</div>
    <div class="weekday">六</div>
    <div class="weekday">日</div>
  </div>
  <div class="days">
    <!-- 第一周 (5月从周四开始) -->
    <div class="day empty"></div>
    <div class="day empty"></div>
    <div class="day empty"></div>
    <div class="day">1<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">2<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">3<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">4<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>

    <!-- 第二周 -->
    <div class="day">5<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">6<div class="indicators"><span class="ind done"></span><span class="ind missed"></span></div></div>
    <div class="day">7<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">8<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day selected">9<div class="indicators"><span class="ind done"></span><span class="ind missed"></span></div></div>
    <div class="day">10<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>
    <div class="day">11<div class="indicators"><span class="ind done"></span><span class="ind done"></span></div></div>

    <!-- 第三周 -->
    <div class="day today">12</div>
    <div class="day future">13</div>
    <div class="day future">14</div>
    <div class="day future">15</div>
    <div class="day future">16</div>
    <div class="day future">17</div>
    <div class="day future">18</div>

    <!-- 第四周 -->
    <div class="day future">19</div>
    <div class="day future">20</div>
    <div class="day future">21</div>
    <div class="day future">22</div>
    <div class="day future">23</div>
    <div class="day future">24</div>
    <div class="day future">25</div>

    <!-- 第五周 -->
    <div class="day future">26</div>
    <div class="day future">27</div>
    <div class="day future">28</div>
    <div class="day future">29</div>
    <div class="day future">30</div>
    <div class="day future">31</div>
    <div class="day empty"></div>
  </div>
</div>

<!-- 选中日期详情 -->
<div class="day-detail">
  <div class="day-detail-header">
    <div class="day-detail-date">5月9日 周五</div>
    <div class="day-detail-badge has-missed">漏服 1 次</div>
  </div>

  <div class="detail-item">
    <div class="detail-status done">✓</div>
    <div class="detail-info">
      <div class="detail-name">维生素 D · 1片</div>
      <div class="detail-meta">早上 8:00</div>
    </div>
    <div class="detail-time">8:12 确认</div>
  </div>

  <div class="detail-item">
    <div class="detail-status done">✓</div>
    <div class="detail-info">
      <div class="detail-name">阿莫西林 · 2粒</div>
      <div class="detail-meta">早上 8:00</div>
    </div>
    <div class="detail-time">8:12 确认</div>
  </div>

  <div class="detail-item">
    <div class="detail-status done">✓</div>
    <div class="detail-info">
      <div class="detail-name">阿莫西林 · 2粒</div>
      <div class="detail-meta">中午 12:00</div>
    </div>
    <div class="detail-time">12:20 确认</div>
  </div>

  <div class="detail-item">
    <div class="detail-status missed">✗</div>
    <div class="detail-info">
      <div class="detail-name">褪黑素 · 1片</div>
      <div class="detail-meta">晚上 20:00</div>
    </div>
    <div class="detail-time">未服用</div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">今日</span>
  </div>
  <div class="nav-item active">
    <span class="nav-icon">📅</span>
    <span class="nav-label">日历</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">💊</span>
    <span class="nav-label">药品</span>
  </div>
</nav>

</body>
</html>
