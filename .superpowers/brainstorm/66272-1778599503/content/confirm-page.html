<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药丸 - 确认服药</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-warm: #FDF6EE;
  --accent-green: #6BBF7A;
  --accent-orange: #F2994A;
  --text-primary: #3D2E1F;
  --text-secondary: #8B7355;
  --text-muted: #BBA88A;
  --shadow-float: 0 8px 32px rgba(139, 115, 85, 0.12);
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
  background: var(--bg-warm);
  color: var(--text-primary);
  min-height: 100vh;
  max-width: 390px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* 背景光晕 */
body::before {
  content: '';
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(242, 153, 74, 0.1) 0%, transparent 60%);
  border-radius: 50%;
  pointer-events: none;
  animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
  50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
}

/* 顶部提示 */
.alert-badge {
  position: absolute;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(242, 153, 74, 0.15);
  border: 1.5px solid rgba(242, 153, 74, 0.3);
  border-radius: 24px;
  padding: 8px 18px;
  font-size: 13px;
  color: var(--accent-orange);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  animation: fadeDown 0.5s ease-out;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.alert-badge .bell {
  animation: ring 1.5s ease-in-out infinite;
  display: inline-block;
}

@keyframes ring {
  0%, 80%, 100% { transform: rotate(0); }
  10% { transform: rotate(12deg); }
  20% { transform: rotate(-12deg); }
  30% { transform: rotate(8deg); }
  40% { transform: rotate(-8deg); }
}

/* 药品信息区 */
.med-display {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp 0.6s ease-out 0.2s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.med-emoji {
  font-size: 64px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.med-time {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 8px;
}

.med-title {
  font-family: 'Quicksand', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.med-dose {
  font-size: 16px;
  color: var(--text-secondary);
}

/* 药品列表（多种药同时间） */
.med-list {
  width: 100%;
  margin-bottom: 48px;
  animation: fadeUp 0.6s ease-out 0.3s both;
}

.med-list-item {
  background: white;
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-float);
}

.med-list-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(242, 153, 74, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.med-list-info { flex: 1; }
.med-list-name { font-size: 16px; font-weight: 600; }
.med-list-dose { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* 滑动确认区域 */
.slide-container {
  width: 100%;
  animation: fadeUp 0.6s ease-out 0.4s both;
}

.slide-track {
  position: relative;
  width: 100%;
  height: 64px;
  background: linear-gradient(135deg, #F2994A, #EB7B30);
  border-radius: 32px;
  display: flex;
  align-items: center;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(242, 153, 74, 0.3);
}

.slide-track::after {
  content: '滑动确认已服用 →';
  position: absolute;
  width: 100%;
  text-align: center;
  color: rgba(255, 255, 255, 0.8);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 1px;
  pointer-events: none;
}

.slide-thumb {
  position: absolute;
  left: 4px;
  width: 56px;
  height: 56px;
  background: white;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: grab;
  transition: left 0.1s ease;
  animation: nudge 2s ease-in-out infinite 1s;
}

@keyframes nudge {
  0%, 100% { left: 4px; }
  30% { left: 20px; }
  60% { left: 4px; }
}

/* 底部提示 */
.hint {
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  animation: fadeUp 0.6s ease-out 0.5s both;
}

/* 成功状态 */
.success-overlay {
  position: fixed;
  inset: 0;
  background: rgba(232, 247, 235, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.success-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.success-check {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--accent-green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: white;
  margin-bottom: 20px;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.success-overlay.show .success-check {
  transform: scale(1);
}

.success-text {
  font-family: 'Quicksand', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #2E7D32;
}

.success-sub {
  font-size: 14px;
  color: #66BB6A;
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="alert-badge">
  <span class="bell">🔔</span>
  该吃药了
</div>

<div class="med-display">
  <div class="med-emoji">💊</div>
  <div class="med-time">早上 8:00</div>
  <div class="med-title">该吃药了</div>
  <div class="med-dose">以下药品需要服用</div>
</div>

<div class="med-list">
  <div class="med-list-item">
    <div class="med-list-icon">💊</div>
    <div class="med-list-info">
      <div class="med-list-name">维生素 D</div>
      <div class="med-list-dose">1片</div>
    </div>
  </div>
  <div class="med-list-item">
    <div class="med-list-icon">💊</div>
    <div class="med-list-info">
      <div class="med-list-name">阿莫西林</div>
      <div class="med-list-dose">2粒</div>
    </div>
  </div>
</div>

<div class="slide-container">
  <div class="slide-track">
    <div class="slide-thumb">✓</div>
  </div>
</div>

<div class="hint">滑动到右侧确认服药 · 未确认将每 5 分钟提醒</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-check">✓</div>
  <div class="success-text">已确认服药</div>
  <div class="success-sub">记录时间：8:03</div>
</div>

<script>
const thumb = document.querySelector('.slide-thumb');
const track = document.querySelector('.slide-track');
const overlay = document.getElementById('successOverlay');
let isDragging = false;
let startX = 0;
let currentX = 4;
const maxX = 326; // track width - thumb width - padding

thumb.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.clientX - currentX;
  thumb.style.cursor = 'grabbing';
  thumb.style.animation = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  let x = e.clientX - startX;
  x = Math.max(4, Math.min(x, maxX));
  currentX = x;
  thumb.style.left = x + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  thumb.style.cursor = 'grab';

  if (currentX > maxX * 0.8) {
    thumb.style.left = maxX + 'px';
    setTimeout(() => overlay.classList.add('show'), 200);
  } else {
    currentX = 4;
    thumb.style.left = '4px';
    thumb.style.animation = 'nudge 2s ease-in-out infinite 1s';
  }
});

// Touch support
thumb.addEventListener('touchstart', (e) => {
  isDragging = true;
  startX = e.touches[0].clientX - currentX;
  thumb.style.animation = 'none';
});

document.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  let x = e.touches[0].clientX - startX;
  x = Math.max(4, Math.min(x, maxX));
  currentX = x;
  thumb.style.left = x + 'px';
});

document.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;

  if (currentX > maxX * 0.8) {
    thumb.style.left = maxX + 'px';
    setTimeout(() => overlay.classList.add('show'), 200);
  } else {
    currentX = 4;
    thumb.style.left = '4px';
    thumb.style.animation = 'nudge 2s ease-in-out infinite 1s';
  }
});
</script>

</body>
</html>
